name: sme_ops_mobile
description: SME Ops Mobile — ERP companion app for Astro8
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Backend
  supabase_flutter: ^2.8.4

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Local storage / offline cache
  drift: ^2.26.1
  sqlite3_flutter_libs: ^0.5.30
  path_provider: ^2.1.5
  path: ^1.9.1

  # UI utilities
  fl_chart: ^0.71.0
  cached_network_image: ^3.4.1
  intl: ^0.20.2
  flutter_svg: ^2.1.0

  # Device / hardware
  mobile_scanner: ^6.0.10
  image_picker: ^1.1.2

  # Push notifications
  flutter_local_notifications: ^18.0.1

  # Misc
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.1
  package_info_plus: ^8.3.0
  connectivity_plus: ^6.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.1
  drift_dev: ^2.26.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
